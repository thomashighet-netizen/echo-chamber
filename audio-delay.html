<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --panel: #10101a; --border: #1e1e30;
    --accent: #00ffaa; --accent2: #ff4466; --warn: #ffaa00;
    --text: #c8c8e0; --dim: #44445a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 72px; color: var(--accent);
    text-shadow: 0 0 40px rgba(0,255,170,0.4); letter-spacing: 0.1em; line-height: 1; }
  .sub { font-size: 11px; letter-spacing: 0.25em; color: var(--dim); margin-bottom: 32px; }
  .version { display:inline-block; background:var(--accent); color:#000;
    font-size:11px; font-weight:bold; letter-spacing:0.2em; padding:2px 8px;
    border-radius:2px; margin-bottom: 32px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius:4px;
    padding: 20px; margin-bottom: 12px; width: 100%; max-width: 400px; }
  .label-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .label { font-size:10px; letter-spacing:0.2em; color:var(--dim); text-transform:uppercase; }
  .val { font-size:28px; color:var(--accent); font-family:'Bebas Neue',sans-serif; }
  .unit { font-size:13px; color:var(--dim); }
  input[type=range] { -webkit-appearance:none; width:100%; height:2px;
    background:var(--border); outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px;
    background:var(--accent); border-radius:50%; box-shadow:0 0 8px rgba(0,255,170,0.5); }
  .vol-val { color: var(--warn); }
  #volSlider::-webkit-slider-thumb { background: var(--warn); box-shadow:0 0 8px rgba(255,170,0,0.5); }
  .btn { font-family:'Share Tech Mono',monospace; font-size:18px; letter-spacing:0.3em;
    background:transparent; border:2px solid var(--accent); color:var(--accent);
    padding:18px; border-radius:4px; cursor:pointer; width:100%; max-width:400px;
    margin-bottom:10px; transition: all 0.15s; }
  .btn:active { background: rgba(0,255,170,0.1); }
  .btn.on { background:rgba(0,255,170,0.12); box-shadow:0 0 24px rgba(0,255,170,0.3); }
  .status { font-size:11px; letter-spacing:0.2em; color:var(--dim); margin-top:8px; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%;
    background:var(--dim); margin-right:8px; vertical-align:middle; }
  .dot.live { background:var(--accent); box-shadow:0 0 6px rgba(0,255,170,0.8);
    animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .bar-wrap { height:3px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--accent); border-radius:2px; width:0%;
    transition:width 0.1s; }
</style>
</head>
<body>

<h1>ECHO</h1>
<div class="sub">DELAY EVERYTHING</div>
<div class="version">v1.0</div>

<div class="panel">
  <div class="label-row">
    <span class="label">Delay</span>
    <span><span class="val" id="delayVal">1.0</span><span class="unit">s</span></span>
  </div>
  <input type="range" id="delaySlider" min="0.1" max="5" step="0.1" value="1.0"
    oninput="document.getElementById('delayVal').textContent=parseFloat(this.value).toFixed(1)">
</div>

<div class="panel">
  <div class="label-row">
    <span class="label">Volume</span>
    <span><span class="val vol-val" id="volVal">80</span><span class="unit">%</span></span>
  </div>
  <input type="range" id="volSlider" min="0" max="100" value="80"
    oninput="document.getElementById('volVal').textContent=this.value;if(outGain)outGain.gain.setTargetAtTime(this.value/100,ctx.currentTime,0.05)">
</div>

<div class="panel">
  <div class="label-row">
    <span class="label">Mic Boost</span>
    <span><span class="val" id="gainVal">3</span><span class="unit">x</span></span>
  </div>
  <input type="range" id="gainSlider" min="1" max="10" step="0.5" value="3"
    oninput="document.getElementById('gainVal').textContent=parseFloat(this.value).toFixed(1);if(inGain)inGain.gain.setTargetAtTime(parseFloat(this.value),ctx.currentTime,0.05)">
</div>

<button class="btn" id="btn" onclick="toggle()">▶ START</button>

<div class="status"><span class="dot" id="dot"></span><span id="status">Ready</span></div>
<div class="bar-wrap" style="width:100%;max-width:400px;margin-top:10px;">
  <div class="bar-fill" id="bar"></div>
</div>

<script>
  let ctx=null, stream=null, proc=null, inGain=null, outGain=null, running=false;
  let ring=null, w=0, r=0, filled=false, N=0;

  async function toggle() {
    if (!running) await start(); else stop();
  }

  async function start() {
    try {
      document.getElementById('status').textContent = 'Opening mic...';
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false,
                 facingMode:{ideal:'environment'} },
        video: false
      });
      ctx    = new AudioContext();
      const sr  = ctx.sampleRate;
      const sec = parseFloat(document.getElementById('delaySlider').value);
      const vol = parseInt(document.getElementById('volSlider').value) / 100;
      const g   = parseFloat(document.getElementById('gainSlider').value);

      N    = Math.floor(sec * sr);
      ring = new Float32Array(N);
      w=0; r=0; filled=false;

      const src = ctx.createMediaStreamSource(stream);
      inGain    = ctx.createGain(); inGain.gain.value = g;
      outGain   = ctx.createGain(); outGain.gain.value = vol;

      proc = ctx.createScriptProcessor(4096, 1, 1);
      proc.onaudioprocess = e => {
        const inp = e.inputBuffer.getChannelData(0);
        const out = e.outputBuffer.getChannelData(0);
        for (let i=0; i<inp.length; i++) {
          ring[w] = inp[i];
          w = (w+1) % N;
          if (!filled && w===0) filled=true;
          out[i] = filled ? ring[r] : 0;
          r = (r+1) % N;
        }
        const pct = filled ? 100 : Math.floor(w/N*100);
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('status').textContent = filled
          ? `Live — ${sec.toFixed(1)}s delay`
          : `Buffering... ${pct}%`;
      };

      src.connect(inGain);
      inGain.connect(proc);
      proc.connect(outGain);
      outGain.connect(ctx.destination);

      running = true;
      document.getElementById('btn').textContent = '■ STOP';
      document.getElementById('btn').classList.add('on');
      document.getElementById('dot').classList.add('live');

    } catch(err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
    }
  }

  function stop() {
    if(proc)    { proc.disconnect();    proc=null; }
    if(inGain)  { inGain.disconnect();  inGain=null; }
    if(outGain) { outGain.disconnect(); outGain=null; }
    if(stream)  { stream.getTracks().forEach(t=>t.stop()); stream=null; }
    if(ctx)     { ctx.close(); ctx=null; }
    ring=null; running=false; filled=false;
    document.getElementById('btn').textContent = '▶ START';
    document.getElementById('btn').classList.remove('on');
    document.getElementById('dot').classList.remove('live');
    document.getElementById('status').textContent = 'Ready';
    document.getElementById('bar').style.width = '0%';
  }
</script>
</body>
</html>
