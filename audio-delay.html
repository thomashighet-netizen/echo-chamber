<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --panel: #10101a; --border: #1e1e30;
    --accent: #00ffaa; --accent2: #ff4466; --warn: #ffaa00;
    --text: #c8c8e0; --dim: #44445a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 72px; color: var(--accent);
    text-shadow: 0 0 40px rgba(0,255,170,0.4); letter-spacing: 0.1em; line-height: 1; }
  .sub { font-size: 11px; letter-spacing: 0.25em; color: var(--dim); margin-bottom: 32px; }
  .version { display:inline-block; background:var(--accent); color:#000;
    font-size:11px; font-weight:bold; letter-spacing:0.2em; padding:2px 8px;
    border-radius:2px; margin-bottom: 32px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius:4px;
    padding: 20px; margin-bottom: 12px; width: 100%; max-width: 400px; }
  .label-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .label { font-size:10px; letter-spacing:0.2em; color:var(--dim); text-transform:uppercase; }
  .val { font-size:28px; color:var(--accent); font-family:'Bebas Neue',sans-serif; }
  .unit { font-size:13px; color:var(--dim); }
  input[type=range] { -webkit-appearance:none; width:100%; height:2px;
    background:var(--border); outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px;
    background:var(--accent); border-radius:50%; box-shadow:0 0 8px rgba(0,255,170,0.5); }
  .vol-val { color: var(--warn); }
  #volSlider::-webkit-slider-thumb { background: var(--warn); box-shadow:0 0 8px rgba(255,170,0,0.5); }
  .btn { font-family:'Share Tech Mono',monospace; font-size:18px; letter-spacing:0.3em;
    background:transparent; border:2px solid var(--accent); color:var(--accent);
    padding:18px; border-radius:4px; cursor:pointer; width:100%; max-width:400px;
    margin-bottom:10px; transition: all 0.15s; }
  .btn:active { background: rgba(0,255,170,0.1); }
  .btn.on { background:rgba(0,255,170,0.12); box-shadow:0 0 24px rgba(0,255,170,0.3); }
  .status { font-size:11px; letter-spacing:0.2em; color:var(--dim); margin-top:8px; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%;
    background:var(--dim); margin-right:8px; vertical-align:middle; }
  .dot.live { background:var(--accent); box-shadow:0 0 6px rgba(0,255,170,0.8);
    animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .bar-wrap { height:3px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--accent); border-radius:2px; width:0%;
    transition:width 0.1s; }
</style>
</head>
<body>

<h1>ECHO</h1>
<div class="sub">DELAY EVERYTHING</div>
<div class="version">v1.9</div>

<div class="panel">
  <div class="label-row">
    <span class="label">Delay</span>
    <span><span class="val" id="delayVal">1.0</span><span class="unit">s</span></span>
  </div>
  <input type="range" id="delaySlider" min="0.1" max="5" step="0.1" value="1.0"
    oninput="document.getElementById('delayVal').textContent=parseFloat(this.value).toFixed(1)">
</div>

<div class="panel">
  <div class="label-row">
    <span class="label">Volume</span>
    <span><span class="val vol-val" id="volVal">80</span><span class="unit">%</span></span>
  </div>
  <input type="range" id="volSlider" min="0" max="100" value="80"
    oninput="document.getElementById('volVal').textContent=this.value;if(outGain)outGain.gain.setTargetAtTime(this.value/100,ctx.currentTime,0.05)">
</div>

<div class="panel">
  <div class="label-row">
    <span class="label">Mic Boost</span>
    <span><span class="val" id="gainVal">3</span><span class="unit">x</span></span>
  </div>
  <input type="range" id="gainSlider" min="1" max="10" step="0.5" value="3"
    oninput="document.getElementById('gainVal').textContent=parseFloat(this.value).toFixed(1);if(inGain)inGain.gain.setTargetAtTime(parseFloat(this.value),ctx.currentTime,0.05)">
</div>

<div class="panel" style="width:100%;max-width:400px;">
  <div class="label-row" style="margin-bottom:8px;">
    <span class="label">Microphone</span>
    <button onclick="scanMics()" style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.15em;background:transparent;border:1px solid var(--dim);color:var(--dim);padding:3px 8px;border-radius:2px;cursor:pointer;">⟳ SCAN</button>
  </div>
  <select id="micSel" style="font-family:'Share Tech Mono',monospace;font-size:12px;background:#0a0a0a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:3px;width:100%;">
    <option value="">Default (built-in)</option>
  </select>
  <div style="font-size:9px;color:var(--dim);margin-top:6px;" id="micHint">Plug in headphones with mic, tap Scan, select headset mic for best results.</div>
</div>

<div class="panel" style="width:100%;max-width:400px;">
  <div class="label-row" style="margin-bottom:8px;">
    <span class="label">Output</span>
    <button onclick="scanOutputs()" style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.15em;background:transparent;border:1px solid var(--dim);color:var(--dim);padding:3px 8px;border-radius:2px;cursor:pointer;">⟳ SCAN</button>
  </div>
  <select id="outSel" style="font-family:'Share Tech Mono',monospace;font-size:12px;background:#0a0a0a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:3px;width:100%;">
    <option value="">Default (phone speaker)</option>
  </select>
  <div style="margin-top:8px;">
    <div class="label" style="margin-bottom:6px;">AUDIO MODE</div>
    <select id="audioMode" style="font-family:'Share Tech Mono',monospace;font-size:12px;background:#0a0a0a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:3px;width:100%;">
      <option value="playback">Playback (normal media)</option>
      <option value="interactive" selected>Interactive → communications sink</option>
      <option value="balanced">Balanced</option>
    </select>
  </div>
  <div style="font-size:9px;color:var(--dim);margin-top:6px;" id="outHint">'Interactive' tries the Android communications stream — may force phone speaker with BT connected.</div>
</div>

<div style="display:flex;gap:8px;width:100%;max-width:400px;margin-bottom:10px;">
  <button onclick="testTone()" style="font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:0.2em;background:transparent;border:2px solid var(--warn);color:var(--warn);padding:14px;border-radius:4px;cursor:pointer;flex:1;">🔔 TEST TONE</button>
</div>
<button class="btn" id="btn" onclick="toggle()">▶ START</button>

<div style="margin-top:12px;background:#111;border:2px solid var(--accent);border-radius:4px;padding:12px;font-size:12px;color:var(--accent);line-height:1.8;word-break:break-all;width:100%;max-width:400px;height:200px;overflow-y:auto;" id="dbg">—</div>
<div style="display:flex;gap:8px;margin-top:8px;width:100%;max-width:400px;">
  <button onclick="shareDebug()" style="font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.15em;background:transparent;border:1px solid var(--accent);color:var(--accent);padding:8px 12px;border-radius:3px;cursor:pointer;flex:1;">📡 SHARE DEBUG</button>
  <button onclick="copyDebug()" style="font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.15em;background:transparent;border:1px solid var(--dim);color:var(--dim);padding:8px 12px;border-radius:3px;cursor:pointer;flex:1;">📋 COPY</button>
</div>
<div style="margin-top:6px;font-size:11px;color:var(--warn);width:100%;max-width:400px;" id="shareNote"></div>

<div class="status"><span class="dot" id="dot"></span><span id="status">Ready</span></div>
<div class="bar-wrap" style="width:100%;max-width:400px;margin-top:10px;">
  <div class="bar-fill" id="bar"></div>
</div>

<script>
  let ctx=null, stream=null, proc=null, inGain=null, outGain=null, running=false;
  let ring=null, w=0, r=0, filled=false, N=0;

  // Debug
  let dbgTimer = null;
  let dbgMicPow = 0, dbgOutPow = 0, dbgFilled = false, dbgSR = 0;

  const TS_MAX = 20;
  let tsData = [];

  function startDbg(sr) {
    dbgSR = sr;
    tsData = [];
    stopDbg();
    const mic = document.getElementById('micSel');
    const micLabel = mic.options[mic.selectedIndex]?.text || 'default';

    dbgTimer = setInterval(() => {
      const db = v => v > 0 ? (20*Math.log10(Math.sqrt(v))).toFixed(1) : '-inf';
      const now = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
      tsData.push({ t: now, mic: db(dbgMicPow), out: db(dbgOutPow), filled: dbgFilled });
      if (tsData.length > TS_MAX) tsData.shift();

      // Build display — most recent at top
      const rows = [...tsData].reverse().map((s,i) => {
        const style = i===0 ? 'color:var(--accent)' : 'color:var(--dim)';
        const f = s.filled ? '✓' : '…';
        return `<span style="${style}">${s.t} ${f} mic:${s.mic}dB out:${s.out}dB</span>`;
      }).join('<br>');

      document.getElementById('dbg').innerHTML =
        `<span style="color:var(--dim);font-size:10px;">sr:${dbgSR} · ${micLabel.substring(0,25)}</span><br>` + rows;
    }, 250);
  }
  function stopDbg() {
    if (dbgTimer) { clearInterval(dbgTimer); dbgTimer = null; }
    document.getElementById('dbg').textContent = '—';
  }

  // Share debug
  function getDebugJson() {
    const mic = document.getElementById('micSel');
    return JSON.stringify({
      timestamp: new Date().toISOString(),
      version: 'v1.4',
      settings: {
        delaySec: parseFloat(document.getElementById('delaySlider').value),
        volumePct: parseInt(document.getElementById('volSlider').value),
        micBoost:  parseFloat(document.getElementById('gainSlider').value),
        micDevice: mic.options[mic.selectedIndex]?.text || 'default',
        outDevice: document.getElementById('outSel').options[document.getElementById('outSel').selectedIndex]?.text || 'default',
        audioMode: document.getElementById('audioMode').value,
        ctxState: ctx?.state || 'null',
        sampleRate: dbgSR,
        filled: dbgFilled
      },
      timeSeries: [...tsData]
    }, null, 2);
  }

  async function shareDebug() {
    const json = getDebugJson();
    const blob = new Blob([json], {type:'application/json'});
    document.getElementById('shareNote').textContent = 'Uploading...';
    let url = null;
    try {
      const fd = new FormData(); fd.append('file', blob, 'echo-debug.json');
      const r = await fetch('https://0x0.st', {method:'POST', body:fd});
      if (r.ok) url = (await r.text()).trim();
    } catch(e) {}
    if (!url) {
      try {
        const r = await fetch('https://transfer.sh/echo-debug.json', {method:'PUT', body:blob, headers:{'Max-Days':'1'}});
        if (r.ok) url = (await r.text()).trim();
      } catch(e) {}
    }
    if (url) {
      document.getElementById('shareNote').textContent = '✓ ' + url;
      if (navigator.clipboard) navigator.clipboard.writeText(url).catch(()=>{});
    } else {
      copyDebug();
      document.getElementById('shareNote').textContent = 'Upload failed — copied to clipboard instead';
    }
  }

  function copyDebug() {
    const json = getDebugJson();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(json)
        .then(() => document.getElementById('shareNote').textContent = '✓ Copied to clipboard')
        .catch(() => document.getElementById('shareNote').textContent = 'Copy failed — select text manually');
    }
  }

  // Test tone — plays 440Hz for 1s to verify audio output works at all
  async function testTone() {
    try {
      const tc = new AudioContext();
      await tc.resume();
      const osc = tc.createOscillator();
      const g   = tc.createGain();
      osc.frequency.value = 440;
      g.gain.value = 0.3;
      osc.connect(g);
      g.connect(tc.destination);
      osc.start();
      g.gain.setTargetAtTime(0, tc.currentTime + 0.8, 0.1);
      osc.stop(tc.currentTime + 1.2);
      setTimeout(() => tc.close(), 1500);
      document.getElementById('shareNote').textContent = 'Test tone played — did you hear it?';
    } catch(e) {
      document.getElementById('shareNote').textContent = 'Test tone failed: ' + e.message;
    }
  }

  // Resume AudioContext if suspended (Android Chrome sometimes suspends it)
  function ensureCtxRunning() {
    if (ctx && ctx.state === 'suspended') {
      ctx.resume();
    }
  }

  async function scanOutputs() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const outputs = devices.filter(d => d.kind === 'audiooutput');
      const sel = document.getElementById('outSel');
      sel.innerHTML = '<option value="">Default</option>';
      let speakerFound = false;
      outputs.forEach((o, i) => {
        const opt = document.createElement('option');
        opt.value = o.deviceId;
        const label = o.label || 'Output ' + (i+1);
        const isPhone = label.toLowerCase().includes('speaker') ||
                        label.toLowerCase().includes('earpiece') ||
                        o.deviceId === 'default';
        const isBT   = label.toLowerCase().includes('bluetooth') ||
                        label.toLowerCase().includes('bt') ||
                        label.toLowerCase().includes('wireless');
        opt.textContent = (isPhone ? '📱 ' : isBT ? '🎧 ' : '') + label;
        if (isPhone && !speakerFound) { opt.selected = true; speakerFound = true; }
        sel.appendChild(opt);
      });
      const hint = document.getElementById('outHint');
      if (outputs.length === 0) {
        hint.textContent = 'Output selection not supported on this browser/device.';
      } else if (speakerFound) {
        hint.textContent = `✓ Phone speaker selected. ${outputs.length} output(s) found.`;
      } else {
        hint.textContent = `${outputs.length} output(s) found — select 📱 phone speaker.`;
      }
    } catch(e) {
      document.getElementById('outHint').textContent = 'Error: ' + e.message;
    }
  }

  async function scanMics() {
    try {
      // Need permission first to get labels
      const tmp = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      tmp.getTracks().forEach(t=>t.stop());
      const devices = await navigator.mediaDevices.enumerateDevices();
      const mics = devices.filter(d=>d.kind==='audioinput');
      const sel = document.getElementById('micSel');
      sel.innerHTML = '<option value="">Default (built-in)</option>';
      mics.forEach((m,i) => {
        const o = document.createElement('option');
        o.value = m.deviceId;
        o.textContent = m.label || 'Mic ' + (i+1);
        // Highlight likely headset mics
        if (m.label.toLowerCase().includes('headset') ||
            m.label.toLowerCase().includes('wired') ||
            m.label.toLowerCase().includes('earphone') ||
            m.label.toLowerCase().includes('external')) {
          o.textContent = '🎧 ' + o.textContent;
          o.selected = true;
        }
        sel.appendChild(o);
      });
      document.getElementById('micHint').textContent = `Found ${mics.length} mic(s). Select your headset mic.`;
    } catch(e) {
      document.getElementById('micHint').textContent = 'Error: ' + e.message;
    }
  }

  function getMicConstraints() {
    const deviceId = document.getElementById('micSel').value;
    const base = { echoCancellation:false, noiseSuppression:false, autoGainControl:false };
    // If using headset mic, can enable echo cancellation since it's separated from speaker
    if (deviceId) return { ...base, deviceId: { exact: deviceId } };
    // Default: prefer environment-facing (rear) mic
    return { ...base, facingMode: { ideal: 'environment' } };
  }

  async function toggle() {
    if (!running) await start(); else stop();
  }

  async function start() {
    try {
      document.getElementById('status').textContent = 'Opening mic...';
      stream = await navigator.mediaDevices.getUserMedia({ audio: getMicConstraints(), video: false });
      const outDeviceId = document.getElementById('outSel').value;
      const audioMode   = document.getElementById('audioMode').value;

      ctx = new AudioContext({ latencyHint: audioMode });

      // Try setSinkId('communications') — on Android this uses the call/speakerphone
      // stream which routes to phone speaker even when BT headphones are connected
      if (ctx.setSinkId) {
        const sinkId = outDeviceId || (audioMode === 'interactive' ? 'communications' : 'default');
        ctx.setSinkId(sinkId)
          .then(() => {
            document.getElementById('outHint').textContent = `✓ Sink: ${sinkId}`;
          })
          .catch(async e => {
            // If 'communications' failed, try without it
            document.getElementById('outHint').textContent = `setSinkId(${sinkId}) failed, trying default...`;
            try {
              await ctx.setSinkId('default');
              document.getElementById('outHint').textContent = '⚠ Using default output';
            } catch(e2) {}
          });
      }
      const sr  = ctx.sampleRate;
      const sec = parseFloat(document.getElementById('delaySlider').value);
      const vol = parseInt(document.getElementById('volSlider').value) / 100;
      const g   = parseFloat(document.getElementById('gainSlider').value);

      N    = Math.floor(sec * sr);
      ring = new Float32Array(N);
      w=0; r=0; filled=false;

      const src = ctx.createMediaStreamSource(stream);
      inGain    = ctx.createGain(); inGain.gain.value = g;
      outGain   = ctx.createGain(); outGain.gain.value = vol;

      proc = ctx.createScriptProcessor(4096, 1, 1);
      proc.onaudioprocess = e => {
        const inp = e.inputBuffer.getChannelData(0);
        const out = e.outputBuffer.getChannelData(0);
        let mp=0, op=0;
        for (let i=0; i<inp.length; i++) {
          ring[w] = inp[i];
          w = (w+1) % N;
          if (!filled && w===0) filled=true;
          out[i] = filled ? ring[r] : 0;
          r = (r+1) % N;
          mp += inp[i]*inp[i];
          op += out[i]*out[i];
        }
        dbgMicPow = mp/inp.length;
        dbgOutPow = op/inp.length;
        dbgFilled = filled;
        const pct = filled ? 100 : Math.floor(w/N*100);
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('status').textContent = filled
          ? `Live — ${sec.toFixed(1)}s delay`
          : `Buffering... ${pct}%`;
      };

      src.connect(inGain);
      inGain.connect(proc);
      proc.connect(outGain);
      outGain.connect(ctx.destination);

      // Resume AudioContext on any touch (Android requirement)
      document.addEventListener('touchstart', ensureCtxRunning, {once:false});
      document.addEventListener('click', ensureCtxRunning, {once:false});
      // Also resume immediately and periodically
      ctx.resume();
      setInterval(() => { if(running && ctx) ctx.resume(); }, 1000);

      running = true;
      document.getElementById('btn').textContent = '■ STOP';
      document.getElementById('btn').classList.add('on');
      document.getElementById('dot').classList.add('live');
      startDbg(sr);

    } catch(err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
    }
  }

  function stop() {
    if(proc)    { proc.disconnect();    proc=null; }
    if(inGain)  { inGain.disconnect();  inGain=null; }
    if(outGain) { outGain.disconnect(); outGain=null; }
    if(stream)  { stream.getTracks().forEach(t=>t.stop()); stream=null; }
    if(ctx)     { ctx.close(); ctx=null; }
    ring=null; running=false; filled=false;
    stopDbg();
    document.getElementById('btn').textContent = '▶ START';
    document.getElementById('btn').classList.remove('on');
    document.getElementById('dot').classList.remove('live');
    document.getElementById('status').textContent = 'Ready';
    document.getElementById('bar').style.width = '0%';
  }
  // Auto-scan for mics on load
  window.addEventListener('load', () => {
    navigator.mediaDevices.getUserMedia({audio:true,video:false})
      .then(tmp => { tmp.getTracks().forEach(t=>t.stop()); scanMics(); scanOutputs(); })
      .catch(() => {}); // silently fail if no permission yet
  });
</script>
</body>
</html>
