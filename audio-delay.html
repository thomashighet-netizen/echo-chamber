<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Chamber</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #10101a;
    --border: #1e1e30;
    --accent: #00ffaa;
    --accent2: #ff4466;
    --warn: #ffaa00;
    --text: #c8c8e0;
    --dim: #44445a;
    --glow: 0 0 20px rgba(0,255,170,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,170,0.015) 2px,
        rgba(0,255,170,0.015) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 12vw, 80px);
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(0,255,170,0.5), 0 0 80px rgba(0,255,170,0.2);
    line-height: 1;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .value-display {
    font-size: 28px;
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
    text-shadow: var(--glow);
    transition: color 0.2s;
  }

  .unit {
    font-size: 13px;
    color: var(--dim);
    margin-left: 3px;
  }

  /* Slider */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
    position: relative;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(0,255,170,0.6);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.25);
    box-shadow: 0 0 20px rgba(0,255,170,0.9);
  }

  input[type=range]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(0,255,170,0.6);
    cursor: pointer;
  }

  /* Tick marks */
  .ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .tick {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0;
    text-align: center;
    min-width: 30px;
  }

  /* Volume slider - different color */
  #volumeSlider::-webkit-slider-thumb {
    background: var(--warn);
    box-shadow: 0 0 10px rgba(255,170,0,0.6);
  }

  #volumeSlider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(255,170,0,0.9);
  }

  .vol-value { color: var(--warn); text-shadow: 0 0 20px rgba(255,170,0,0.3); }

  /* Visualizer */
  .viz-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
  }

  canvas {
    width: 100%;
    height: 60px;
    display: block;
    border-radius: 2px;
  }

  /* Big button */
  .btn {
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.3em;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s, color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: rgba(0,255,170,0.08);
    box-shadow: var(--glow);
  }

  .btn.active {
    background: rgba(0,255,170,0.12);
    box-shadow: 0 0 30px rgba(0,255,170,0.4);
    border-color: var(--accent);
  }

  .btn.active::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s linear infinite;
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }

  .btn.stop {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .btn.stop:hover {
    background: rgba(255,68,102,0.08);
    box-shadow: 0 0 20px rgba(255,68,102,0.3);
  }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .dot.live {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,255,170,0.8);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { flex: 1; }

  /* Buffer fill */
  .buffer-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 10px;
    overflow: hidden;
  }

  .buffer-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 6px rgba(0,255,170,0.5);
  }

  /* Slider track fill via CSS custom property */
  input[type=range] {
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 0%), var(--border) var(--fill, 0%), var(--border) 100%);
  }

  #volumeSlider {
    background: linear-gradient(to right, var(--warn) 0%, var(--warn) var(--fill, 0%), var(--border) var(--fill, 0%), var(--border) 100%);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="title">ECHO</div>
    <div class="subtitle">Variable Delay Monitor</div>
  </header>

  <!-- Delay control -->
  <div class="panel">
    <div class="label-row">
      <span class="label">Delay</span>
      <span><span class="value-display" id="delayVal">1.0</span><span class="unit">s</span></span>
    </div>
    <input type="range" id="delaySlider" min="0.1" max="10" step="0.1" value="1.0">
    <div class="ticks">
      <span class="tick">0.1</span>
      <span class="tick">2.5</span>
      <span class="tick">5</span>
      <span class="tick">7.5</span>
      <span class="tick">10</span>
    </div>
  </div>

  <!-- Volume control -->
  <div class="panel">
    <div class="label-row">
      <span class="label">Output Volume</span>
      <span><span class="value-display vol-value" id="volVal">80</span><span class="unit">%</span></span>
    </div>
    <input type="range" id="volumeSlider" min="0" max="100" step="1" value="80">
    <div class="ticks">
      <span class="tick">0</span>
      <span class="tick">25</span>
      <span class="tick">50</span>
      <span class="tick">75</span>
      <span class="tick">100</span>
    </div>
  </div>

  <!-- Speaker latency control -->
  <div class="panel">
    <div class="label-row">
      <span class="label">Speaker Latency</span>
      <span style="display:flex;align-items:baseline;gap:10px;">
        <span><span class="value-display" id="latencyVal" style="font-size:20px;color:var(--warn)">178</span><span class="unit">ms</span></span>
        <button id="detectBtn" onclick="runLatencyDetection()" style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;background:transparent;border:1px solid var(--dim);color:var(--dim);padding:4px 8px;border-radius:3px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--warn)';this.style.color='var(--warn)'" onmouseout="this.style.borderColor='var(--dim)';this.style.color='var(--dim)'">⟳ DETECT</button>
      </span>
    </div>
    <input type="range" id="latencySlider" min="5" max="300" step="1" value="178">
    <div class="ticks">
      <span class="tick">5ms</span>
      <span class="tick">75</span>
      <span class="tick">150</span>
      <span class="tick">225</span>
      <span class="tick">300ms</span>
    </div>
    <div class="label" style="margin-top:8px;font-size:9px;color:var(--dim);" id="latencyNote">Estimated speaker→mic travel time. Click Detect to measure.</div>
  </div>

  <!-- Visualizer -->
  <div class="viz-panel">
    <div class="label" style="margin-bottom:10px;">Input Level</div>
    <canvas id="viz" height="60"></canvas>
    <div class="buffer-track">
      <div class="buffer-fill" id="bufferFill"></div>
    </div>
    <div class="label" style="margin-top:6px; font-size:9px;" id="bufferLabel">Buffer: 0.0s / 0.0s</div>
  </div>

  <button class="btn" id="mainBtn" onclick="toggle()">▶ Start Listening</button>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Idle — Click start to begin</span>
  </div>
</div>

<script>
  let audioCtx    = null;
  let sourceNode  = null;
  let procNode    = null;   // ScriptProcessor or AudioWorkletNode
  let outGainNode = null;
  let analyser    = null;
  let stream      = null;
  let running     = false;
  let filled      = false;
  let bufferSamples = 0;

  // Ring buffer (lives in main thread for ScriptProcessor path)
  let ringBuf = null;
  let wPos = 0, rPos = 0;

  // AudioWorklet code — used if browser supports blob worklets
  const WORKLET_CODE = `
class DelayProcessor extends AudioWorkletProcessor {
  static get parameterDescriptors() { return [
    { name: 'delaySamples', defaultValue: 48000, minValue: 480, maxValue: 480000 },
  ]; }
  constructor() {
    super();
    this._buf  = new Float32Array(480001);
    this._w = 0; this._r = 0; this._filled = false; this._fc = 0;
  }
  process(inputs, outputs, params) {
    const inp = inputs[0]?.[0], out = outputs[0]?.[0];
    if (!inp || !out) return true;
    const delay = Math.max(480, Math.min(Math.round(params.delaySamples[0]), 480000));
    for (let i = 0; i < inp.length; i++) {
      this._buf[this._w] = inp[i];
      this._w = (this._w + 1) % delay;
      if (!this._filled && this._w === 0) this._filled = true;
      out[i] = this._filled ? this._buf[this._r] : 0;
      this._r = (this._r + 1) % delay;
    }
    if (++this._fc % 16 === 0)
      this.port.postMessage({ filled: this._filled, w: this._w, delay });
    return true;
  }
}
registerProcessor('delay-processor', DelayProcessor);
`;

  const delaySlider   = document.getElementById('delaySlider');
  const volumeSlider  = document.getElementById('volumeSlider');
  const latencySlider = document.getElementById('latencySlider');
  const delayVal      = document.getElementById('delayVal');
  const volVal        = document.getElementById('volVal');
  const latencyVal    = document.getElementById('latencyVal');
  const latencyNote   = document.getElementById('latencyNote');
  const detectBtn     = document.getElementById('detectBtn');
  const mainBtn       = document.getElementById('mainBtn');
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');
  const bufferFill    = document.getElementById('bufferFill');
  const bufferLabel   = document.getElementById('bufferLabel');
  const canvas        = document.getElementById('viz');
  const ctx2d         = canvas.getContext('2d');

  function setSliderFill(s, pct) { s.style.setProperty('--fill', pct + '%'); }
  function getLatencyMs() { return parseInt(latencySlider.value); }

  setSliderFill(delaySlider,   ((1.0 - 0.1) / (10 - 0.1)) * 100);
  setSliderFill(volumeSlider,  80);
  setSliderFill(latencySlider, ((178 - 5) / (300 - 5)) * 100);

  delaySlider.addEventListener('input', () => {
    const v = parseFloat(delaySlider.value);
    delayVal.textContent = v.toFixed(1);
    setSliderFill(delaySlider, ((v - 0.1) / (10 - 0.1)) * 100);
    if (audioCtx && procNode?.parameters) {
      procNode.parameters.get('delaySamples')
        .setTargetAtTime(Math.floor(v * audioCtx.sampleRate), audioCtx.currentTime, 0.05);
    }
  });

  volumeSlider.addEventListener('input', () => {
    const v = parseInt(volumeSlider.value);
    volVal.textContent = v;
    setSliderFill(volumeSlider, v);
    if (outGainNode) outGainNode.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.05);
  });

  latencySlider.addEventListener('input', () => {
    const v = parseInt(latencySlider.value);
    latencyVal.textContent = v;
    setSliderFill(latencySlider, ((v - 5) / (300 - 5)) * 100);
    latencyNote.textContent = 'Manually set.';
  });

  // ── Latency detection ──
  let detecting = false;
  async function runLatencyDetection() {
    if (detecting) return;
    detecting = true;
    detectBtn.textContent = '⟳ DETECTING...';
    detectBtn.style.color = 'var(--warn)';
    detectBtn.style.borderColor = 'var(--warn)';
    latencyNote.textContent = 'Playing probe tone... keep quiet.';
    try {
      const ds = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
      const dc = new AudioContext();
      const sr = dc.sampleRate;
      const chirpN = Math.floor(40/1000*sr), listenN = Math.floor(500/1000*sr);
      const cb = dc.createBuffer(1, chirpN, sr);
      const cd = cb.getChannelData(0);
      for (let i=0;i<chirpN;i++){const e=0.5-0.5*Math.cos(2*Math.PI*i/chirpN);cd[i]=e*Math.sin(2*Math.PI*18500*i/sr);}
      const rec=new Float32Array(listenN); let rp=0;
      const ms=dc.createMediaStreamSource(ds),sp=dc.createScriptProcessor(512,1,1),sg=dc.createGain();
      sg.gain.value=0; ms.connect(sp);sp.connect(sg);sg.connect(dc.destination);
      sp.onaudioprocess=(e)=>{const d=e.inputBuffer.getChannelData(0);for(let i=0;i<d.length&&rp<listenN;i++)rec[rp++]=d[i];};
      const cs=dc.createBufferSource(),cg=dc.createGain();cg.gain.value=0.6;
      cs.buffer=cb;cs.connect(cg);cg.connect(dc.destination);cs.start();
      await new Promise(r=>setTimeout(r,580));
      sp.disconnect();ms.disconnect();ds.getTracks().forEach(t=>t.stop());dc.close();
      let refPow=0;for(let i=0;i<chirpN;i++)refPow+=cd[i]*cd[i];
      const refRms=Math.sqrt(refPow/chirpN)||1;
      let bestLag=Math.floor(5/1000*sr),bestScore=-Infinity;
      for(let lag=bestLag;lag<Math.floor(400/1000*sr)&&lag+chirpN<listenN;lag++){
        let dot=0,mp=0;for(let j=0;j<chirpN;j++){dot+=cd[j]*rec[lag+j];mp+=rec[lag+j]*rec[lag+j];}
        const score=dot/(chirpN*refRms*(Math.sqrt(mp/chirpN)||1));
        if(score>bestScore){bestScore=score;bestLag=lag;}
      }
      const oneWayMs=Math.round((bestLag/sr)*500);
      if(bestScore>0.04&&oneWayMs>=5&&oneWayMs<=350){
        const c=Math.max(5,Math.min(300,oneWayMs));
        latencySlider.value=c;latencyVal.textContent=c;
        setSliderFill(latencySlider,((c-5)/(300-5))*100);
        latencyNote.textContent=`✓ Detected ${c}ms (score: ${bestScore.toFixed(3)})`;
      } else {
        latencyNote.textContent=`⚠ Uncertain (score: ${bestScore.toFixed(3)}) — using ${getLatencyMs()}ms`;
      }
    } catch(e){ latencyNote.textContent='⚠ Failed: '+e.message; }
    detectBtn.textContent='⟳ DETECT';
    detectBtn.style.color='';detectBtn.style.borderColor='';
    detecting=false;
  }

  // ── Progress update (ScriptProcessor path) ──
  function updateProgress(w, delay, sr) {
    if (filled) {
      bufferFill.style.width = '100%';
      const d = parseFloat(delaySlider.value);
      bufferLabel.textContent = `Buffer: ${d.toFixed(1)}s / ${d.toFixed(1)}s`;
    } else {
      bufferFill.style.width = ((w / delay) * 100) + '%';
      bufferLabel.textContent = `Buffer: ${(w/sr).toFixed(1)}s / ${(delay/sr).toFixed(1)}s`;
    }
  }

  async function toggle() { if (!running) await start(); else stop(); }

  async function start() {
    try {
      setStatus('Requesting microphone...');
      stream = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});

      audioCtx = new AudioContext();
      const sr = audioCtx.sampleRate;
      bufferSamples = Math.floor(parseFloat(delaySlider.value) * sr);
      const vol = parseInt(volumeSlider.value) / 100;

      sourceNode  = audioCtx.createMediaStreamSource(stream);
      analyser    = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      outGainNode = audioCtx.createGain();
      outGainNode.gain.value = vol;

      sourceNode.connect(analyser);

      // Try AudioWorklet first, fall back to ScriptProcessor
      let useWorklet = false;
      try {
        const blob    = new Blob([WORKLET_CODE], {type:'application/javascript'});
        const blobUrl = URL.createObjectURL(blob);
        await audioCtx.audioWorklet.addModule(blobUrl);
        URL.revokeObjectURL(blobUrl);
        useWorklet = true;
      } catch(e) { console.warn('AudioWorklet unavailable, using ScriptProcessor:', e); }

      if (useWorklet) {
        procNode = new AudioWorkletNode(audioCtx, 'delay-processor',
          {numberOfInputs:1, numberOfOutputs:1, outputChannelCount:[1]});
        procNode.parameters.get('delaySamples').value = bufferSamples;
        procNode.port.onmessage = (e) => {
          filled = e.data.filled;
          updateProgress(e.data.w, e.data.delay, sr);
        };
        sourceNode.connect(procNode);
        procNode.connect(outGainNode);
      } else {
        // ScriptProcessor fallback — use smallest buffer to minimise glitches
        ringBuf = new Float32Array(bufferSamples);
        wPos = 0; rPos = 0; filled = false;
        procNode = audioCtx.createScriptProcessor(256, 1, 1);
        procNode.onaudioprocess = (e) => {
          const inp = e.inputBuffer.getChannelData(0);
          const out = e.outputBuffer.getChannelData(0);
          for (let i = 0; i < inp.length; i++) {
            ringBuf[wPos] = inp[i];
            wPos = (wPos + 1) % bufferSamples;
            if (!filled && wPos === 0) filled = true;
            out[i] = filled ? ringBuf[rPos] : 0;
            rPos = (rPos + 1) % bufferSamples;
          }
          updateProgress(wPos, bufferSamples, sr);
        };
        sourceNode.connect(procNode);
        procNode.connect(outGainNode);
      }

      outGainNode.connect(audioCtx.destination);

      running = true;
      mainBtn.textContent = '■ Stop';
      mainBtn.classList.add('active', 'stop');
      statusDot.classList.add('live');
      setStatus('Live' + (useWorklet ? '' : ' (compat mode)'));
      drawViz();
    } catch(err) {
      setStatus('Error: ' + err.message);
      console.error(err);
    }
  }

  function stop() {
    if (procNode)    { procNode.disconnect();    procNode = null; }
    if (sourceNode)  { sourceNode.disconnect();  sourceNode = null; }
    if (outGainNode) { outGainNode.disconnect(); outGainNode = null; }
    if (stream)      { stream.getTracks().forEach(t=>t.stop()); stream = null; }
    if (audioCtx)   { audioCtx.close(); audioCtx = null; }
    ringBuf = null; running = false; filled = false;
    mainBtn.textContent = '▶ Start Listening';
    mainBtn.classList.remove('active','stop');
    statusDot.classList.remove('live');
    setStatus('Idle — Click start to begin');
    bufferFill.style.width = '0%';
    bufferLabel.textContent = 'Buffer: 0.0s / 0.0s';
    ctx2d.clearRect(0,0,canvas.width,canvas.height);
  }

  function setStatus(msg) { statusText.textContent = msg; }

  function drawViz() {
    if (!running || !analyser) return;
    requestAnimationFrame(drawViz);
    const W = canvas.clientWidth * devicePixelRatio;
    const H = canvas.clientHeight * devicePixelRatio;
    if (canvas.width !== W || canvas.height !== H) { canvas.width=W; canvas.height=H; }
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);
    ctx2d.clearRect(0,0,W,H);
    ctx2d.strokeStyle='rgba(0,255,170,0.8)';
    ctx2d.lineWidth=1.5;
    ctx2d.shadowColor='rgba(0,255,170,0.4)';
    ctx2d.shadowBlur=6;
    ctx2d.beginPath();
    const sw=W/data.length; let x=0;
    for(let i=0;i<data.length;i++){
      const y=(data[i]/128.0)*(H/2);
      if(i===0)ctx2d.moveTo(x,y);else ctx2d.lineTo(x,y);
      x+=sw;
    }
    ctx2d.stroke(); ctx2d.shadowBlur=0;
  }

  if ('serviceWorker' in navigator)
    window.addEventListener('load', ()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
</body>
</html>
